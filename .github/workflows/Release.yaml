name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  Release:
    if: ${{ github.event.pull_request.merged == true }}
    uses: gesslar/Maint/.github/workflows/ReleaseGo.yaml@main
    secrets: inherit
    with:
      main_package: "."
      version_ldflag: "main.version"
    permissions:
      contents: write
